services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: benchmark
      POSTGRES_USER: benchmark
      POSTGRES_PASSWORD: benchmark
    ports:
      - "5432:5432"
    volumes:
      - benchmark-postgres:/var/lib/postgresql/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    environment:
      BENCHMARK_DATABASE_URL: postgresql+psycopg://benchmark:benchmark@postgres:5432/benchmark
      BENCHMARK_STORAGE_ROOT: calls
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - ./calls:/app/calls

volumes:
  benchmark-postgres:
