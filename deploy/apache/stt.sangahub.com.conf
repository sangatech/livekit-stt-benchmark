<VirtualHost *:80>
    ServerName livekit-stt.sangahub.com

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket endpoints
    ProxyPass /ws/ ws://127.0.0.1:8090/ws/
    ProxyPassReverse /ws/ ws://127.0.0.1:8090/ws/

    # FastAPI dashboard and REST API
    ProxyPass / http://127.0.0.1:8090/
    ProxyPassReverse / http://127.0.0.1:8090/

    ErrorLog ${APACHE_LOG_DIR}/livekit-stt.sangahub.com-error.log
    CustomLog ${APACHE_LOG_DIR}/livekit-stt.sangahub.com-access.log combined
</VirtualHost>

# After enabling HTTPS with certbot, the generated :443 vhost should keep
# the same ProxyPass rules above, including the ws:// /ws/ proxy.
